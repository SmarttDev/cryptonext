services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptonext
      POSTGRES_PASSWORD: cryptonext
      POSTGRES_DB: cryptonext
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/backend/scripts/init-test-db.sql:/docker-entrypoint-initdb.d/00-init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cryptonext -d cryptonext']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cryptonext:cryptonext@postgres:5432/cryptonext
      PORT: '3001'
      FRONTEND_URL: http://localhost:3000
      # Set to "true" to reset and seed the database on container boot.
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Baked into the client bundle at build time; must resolve from the
        # user's browser, not from container DNS.
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  pgdata:
